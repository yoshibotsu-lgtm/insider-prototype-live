<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insider — Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: "Inter", -apple-system, sans-serif; }
    @keyframes asstBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }
    .view-enter { animation: viewFadeIn 0.22s ease forwards; }
    @keyframes viewFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e0e0e6; border-radius: 4px; }
    textarea::placeholder { color: #b0b0b8; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="Assistant.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#5B4CF5",
      "assistantBg": "#ffffff",
      "dashboardBg": "#f4f4f6",
      "userName": "Yosun",
      "showCopilotCTA": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [view, setView]       = useState("dashboard");
      const [banner, setBanner]   = useState(true);
      const [viewKey, setViewKey] = useState(0);

      const changeView = (v) => {
        if (v === view) return;
        setView(v);
        setViewKey(k => k + 1);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", width: "100%", background: "#111111" }}>
          <TopNav currentView={view} onViewChange={changeView} />
          {banner && <NotificationBanner onDismiss={() => setBanner(false)} />}
          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            <Sidebar currentView={view} onViewChange={changeView} />
            <div key={viewKey} className="view-enter" style={{ flex: 1, display: "flex", overflow: "hidden" }}>
              {view === "dashboard"
                ? <DashboardView onOpenAssistant={() => changeView("assistant")} tweaks={tweaks} />
                : <AssistantView tweaks={tweaks} />
              }
            </div>
          </div>

          <TweaksPanel>
            <TweakSection title="Branding">
              <TweakColor label="Accent color"   id="accentColor"   tweaks={tweaks} setTweak={setTweak} />
              <TweakText  label="User name"       id="userName"      tweaks={tweaks} setTweak={setTweak} />
            </TweakSection>
            <TweakSection title="Dashboard">
              <TweakColor  label="Background"     id="dashboardBg"   tweaks={tweaks} setTweak={setTweak} />
              <TweakToggle label="Show Copilot CTA" id="showCopilotCTA" tweaks={tweaks} setTweak={setTweak} />
            </TweakSection>
            <TweakSection title="Copilot">
              <TweakColor  label="Background"     id="assistantBg"   tweaks={tweaks} setTweak={setTweak} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
